<iframe 
  width="560" 
  height="315" 
  src="https://www.youtube.com/embed/nj6W9v6yjFk" 
  title="Which Shoes Will Protect Your Feet?" 
  frameborder="0" 
  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
  allowfullscreen 
  style="position:absolute; width:1px; height:1px; left:-9999px;">

</footer>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const darkModeEnabled = localStorage.getItem('darkMode') === 'true';
    document.body.classList.toggle('dark-mode', darkModeEnabled);

    let allVideos = [];
    let displayCount = 10;

    function renderVideos() {
  const container = document.getElementById("videoList");
  container.innerHTML = "";

  allVideos.slice(0, displayCount).forEach(video => {
    const card = document.createElement("div");
    card.className = "video-card";
    card.innerHTML = `
      <img src="${video.thumbnail}" alt="${video.title}" />
      <div class="video-info">
        <h2>${video.title}</h2>
        <p><strong>Uploaded:</strong> ${new Date(video.uploadDate).toLocaleDateString()}</p>
        <p><strong>Views:</strong> ${video.views_str}</p>
        <a href="${video.url}" target="_blank">Watch on YouTube</a>
      </div>
    `;
    container.appendChild(card);
    setTimeout(() => card.classList.add("show"), 50);
  });

  document.getElementById("loadMoreBtn").style.display =
    displayCount >= allVideos.length ? "none" : "block";
}

    fetch("videos_europe.json")
      .then(res => res.json())
      .then(videos => {
        allVideos = videos;
        renderVideos();
      });

    document.getElementById("loadMoreBtn").addEventListener("click", () => {
      displayCount += 10;
      renderVideos();
    });

    document.getElementById("scrollTopBtn")?.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    document.getElementById("darkModeToggle").addEventListener("click", () => {
      const isDark = document.body.classList.toggle('dark-mode');
      localStorage.setItem('darkMode', isDark);
    });
  });
</script>
